<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaurusProTips - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .navbar {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 1rem 0;
            margin-bottom: 2rem;
            border-bottom: 3px solid #ffd700;
        }
        
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            color: #ffd700;
            font-weight: bold;
        }
        
        .logout-btn {
            background: #ffd700;
            color: #1a1a1a;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .logout-btn:hover {
            background: #ffed4e;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        
        .login-form {
            background: #2d2d2d;
            padding: 2rem;
            border-radius: 10px;
            border: 2px solid #ffd700;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-form h1 {
            color: #ffd700;
            margin-bottom: 1.5rem;
        }
        
        .login-form input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .login-form button {
            width: 100%;
            padding: 0.8rem;
            background: #ffd700;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .login-form button:hover {
            background: #ffed4e;
        }
        
        .dashboard {
            display: none;
        }
        
        .dashboard.active {
            display: block;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #2d2d2d 0%, #3d3d3d 100%);
            padding: 2rem;
            border-radius: 10px;
            border-left: 5px solid #ffd700;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            color: #fff;
            font-weight: bold;
        }
        
        .section {
            background: #2d2d2d;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid #444;
        }
        
        .section h2 {
            color: #ffd700;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ffd700;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #444;
            border-radius: 5px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn-submit {
            background: #ffd700;
            color: #1a1a1a;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .btn-submit:hover {
            background: #ffed4e;
        }
        
        .subscribers-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .subscriber-item {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
            border-left: 3px solid #ffd700;
        }
        
        .subscriber-item strong {
            color: #ffd700;
        }
        
        .error {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .success {
            color: #51cf66;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- LOGIN FORM -->
    <div id="loginContainer" class="login-container">
        <form class="login-form" onsubmit="handleLogin(event)">
            <h1>🐂 TaurusProTips Admin</h1>
            <input type="password" id="password" placeholder="Enter Admin Password" required>
            <button type="submit">Login</button>
            <p style="margin-top: 1rem; color: #999; font-size: 0.9rem;">Password: admin123</p>
        </form>
    </div>
    
    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">
        <nav class="navbar">
            <div class="container">
                <div class="logo">🐂 TaurusProTips Admin</div>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </nav>
        
        <div class="container">
            <!-- STATS -->
            <div class="dashboard-grid">
                <div class="stat-card">
                    <h3>Total Subscribers</h3>
                    <div class="value" id="totalSubs">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <div class="value" id="totalRevenue">Ksh 0</div>
                </div>
                <div class="stat-card">
                    <h3>Paid Users</h3>
                    <div class="value" id="paidUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>Tips Posted</h3>
                    <div class="value" id="tipsPosted">0</div>
                </div>
            </div>
            
            <!-- POST TIP -->
            <div class="section">
                <h2>📝 Post Daily Tip</h2>
                <form onsubmit="handlePostTip(event)">
                    <div class="form-group">
                        <label>Match</label>
                        <input type="text" placeholder="e.g., Manchester City vs Arsenal" required>
                    </div>
                    <div class="form-group">
                        <label>League</label>
                        <input type="text" placeholder="e.g., Premier League" required>
                    </div>
                    <div class="form-group">
                        <label>Prediction</label>
                        <input type="text" placeholder="e.g., Home Win, Over 2.5 Goals" required>
                    </div>
                    <div class="form-group">
                        <label>Confidence (1-10)</label>
                        <input type="number" min="1" max="10" placeholder="8" required>
                    </div>
                    <div class="form-group">
                        <label>Odds</label>
                        <input type="number" step="0.01" placeholder="1.95" required>
                    </div>
                    <button type="submit" class="btn-submit">Post Tip</button>
                </form>
                <p id="tipMessage" style="margin-top: 1rem;"></p>
            </div>
            
            <!-- SUBSCRIBERS LIST -->
            <div class="section">
                <h2>👥 Registered Subscribers</h2>
                <div class="subscribers-list" id="subscribersList">
                    <p>No subscribers yet</p>
                </div>
            </div>
            
            <!-- RECENT TIPS -->
            <div class="section">
                <h2>🎯 Recent Tips Posted</h2>
                <div id="tipsList">
                    <p>No tips posted yet</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const ADMIN_PASSWORD = 'admin123';
        
        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else {
                alert('❌ Wrong password!');
            }
        }
        
        function handleLogout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }
        
        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            loadDashboardData();
        }
        
        function handlePostTip(event) {
            event.preventDefault();
            const form = event.target;
            const match = form.elements[0].value;
            const league = form.elements[1].value;
            const prediction = form.elements[2].value;
            const confidence = form.elements[3].value;
            const odds = form.elements[4].value;
            
            const tip = {
                match: match,
                league: league,
                prediction: prediction,
                confidence: confidence,
                odds: odds,
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString()
            };
            
            let tips = JSON.parse(localStorage.getItem('taurustips_posted')) || [];
            tips.unshift(tip);
            localStorage.setItem('taurustips_posted', JSON.stringify(tips));
            
            document.getElementById('tipMessage').innerHTML = '✅ <span class="success">Tip posted successfully!</span>';
            form.reset();
            setTimeout(() => {
                document.getElementById('tipMessage').innerHTML = '';
                loadDashboardData();
            }, 2000);
        }
        
        function loadDashboardData() {
            // Load subscribers
            const users = JSON.parse(localStorage.getItem('taurustips_users')) || [];
            document.getElementById('totalSubs').textContent = users.length;
            
            // Calculate revenue
            const paidUsers = users.filter(u => u.plan !== 'free');
            let revenue = 0;
            paidUsers.forEach(u => {
                if (u.plan === 'pro') revenue += 2000;
                if (u.plan === 'vip') revenue += 10000;
            });
            document.getElementById('totalRevenue').textContent = 'Ksh ' + revenue.toLocaleString();
            document.getElementById('paidUsers').textContent = paidUsers.length;
            
            // Load tips
            const tips = JSON.parse(localStorage.getItem('taurustips_posted')) || [];
            document.getElementById('tipsPosted').textContent = tips.length;
            
            // Display subscribers
            const subsList = document.getElementById('subscribersList');
            if (users.length > 0) {
                subsList.innerHTML = users.map(u => `
                    <div class="subscriber-item">
                        <strong>${u.name}</strong><br>
                        📧 ${u.email}<br>
                        📱 ${u.phone}<br>
                        💰 Plan: ${u.plan.toUpperCase()}
                    </div>
                `).join('');
            }
            
            // Display recent tips
            const tipsList = document.getElementById('tipsList');
            if (tips.length > 0) {
                tipsList.innerHTML = tips.map(t => `
                    <div class="subscriber-item">
                        <strong>${t.match}</strong><br>
                        🏆 ${t.league} | 🎯 ${t.prediction}<br>
                        💪 Confidence: ${t.confidence}/10 | 💵 Odds: ${t.odds}<br>
                        📅 ${t.date} ${t.time}
                    </div>
                `).join('');
            }
        }
        
        // Check if already logged in
        window.addEventListener('load', function() {
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                showDashboard();
            }
        });
    </script>
</body>
</html>
